# Category-specific configuration for exact miscellaneous file downloads.
category_id: general
enabled: true
paths:
  library_path: ./library/General
properties: {}
lifecycle_policy:
  policy_version: 1
  identity_fields: [category_id, item_id, title, literal_filename]
  lifecycle_fields: [library_presence, file_count, total_size_bytes]
  suggestion_types: [manual_review]
  invalidation_triggers: [library_changed, download_completed, download_failed, manual_refresh, policy_version_changed]
  llm_policy_description: >-
    General Files is intentionally conservative. It should only be used for exact,
    user-named miscellaneous payloads that do not fit richer installed categories.
scheduler:
  enabled: false
storage:
  inherit_global_thresholds: true
