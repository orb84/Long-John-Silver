# Category-specific configuration for episodic TV media.
category_id: tv
enabled: true
paths:
  library_path: ./library/TV Shows
properties:
  naming_template: "{series_title}/Season {season:02d}/{series_title} - S{season:02d}E{episode:02d} - {episode_title}"
  active_update_interval_days: 7
  inactive_update_interval_days: 90
  ended_update_interval_days: 180
  upgrade_scan_interval_days: 30
metadata:
  providers:
    tmdb:
      enabled: true
    tvmaze:
      enabled: true
lifecycle_policy:
  policy_version: 2
  identity_fields: [provider, external_id, title, first_air_date]
  lifecycle_fields: [airing_status, next_air_date, season_status, missing_episodes, language, quality, release_cadence, specials]
  suggestion_types: [missing_episode, download_next, download_all_missing, download_remaining_next, quality_upgrade, related_media, metadata_repair]
  invalidation_triggers: [library_changed, metadata_changed, taste_changed, download_completed, download_failed, new_episode_detected, user_quality_or_language_changed, manual_refresh, policy_version_changed]
  llm_policy_description: >-
    TV suggestions depend on airing status, next known episode date, season completeness,
    missing aired episodes, language, release quality, and upgrade opportunities. Saved
    suggestions remain valid until a known air-date/provider/library/preference change
    makes them stale.
scheduler:
  enabled: true
storage:
  inherit_global_thresholds: true
